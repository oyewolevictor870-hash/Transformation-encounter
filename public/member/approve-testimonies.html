<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Approve Testimonies | Transformation Encounter</title>
<link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/member.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="sidebar-brand"><div style="width:40px;height:40px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:20px">🔥</div><div><div class="sidebar-title">TE Group</div><div class="sidebar-role-badge">Workers</div></div></div></div>
    <div class="sidebar-user"><div id="sidebarAvatar" style="width:40px;height:40px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;color:var(--primary);font-weight:700">?</div><div><div class="sidebar-username" id="sidebarName">Loading...</div></div></div>
    <nav class="sidebar-nav">
      <a href="/member/dashboard.html" class="sidebar-link"><span class="icon">🏠</span> Home Feed</a>
      <a href="/member/post-content.html" class="sidebar-link"><span class="icon">✏️</span> Post Content</a>
      <a href="/member/approve-testimonies.html" class="sidebar-link active"><span class="icon">✅</span> Approve Testimonies</a>
      <a href="/member/manage-prayers.html" class="sidebar-link"><span class="icon">⚙️</span> Manage Prayers</a>
    </nav>
    <div class="sidebar-footer"><a href="#" onclick="logout()" class="sidebar-link"><span class="icon">🚪</span> Sign Out</a></div>
  </aside>
  <div class="main-content">
    <header class="top-bar">
      <div class="top-bar-left"><button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button><div class="page-title">✅ Approve Testimonies</div></div>
    </header>
    <div class="content-area">
      <div class="alert alert-info">Review submitted testimonies and approve or reject them. Approved testimonies will appear on the testimonies page.</div>
      <div id="pendingList"><div class="flex-center" style="padding:60px"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>
<div class="toast-container"></div>
<script src="/js/api.js"></script>
<script>
async function init() {
  const user = Utils.requireRole(['worker','admin']);
  if (!user) return;
  document.getElementById('sidebarName').textContent = user.full_name;
  document.getElementById('sidebarAvatar').textContent = Utils.initials(user.full_name);
  loadPending();
}
async function loadPending() {
  const container = document.getElementById('pendingList');
  try {
    const res = await API.getPendingTestimonies();
    if (!res?.testimonies?.length) { container.innerHTML = '<div class="empty-state"><div class="icon">✅</div><h3>No pending testimonies</h3><p>All testimonies have been reviewed.</p></div>'; return; }
    container.innerHTML = res.testimonies.map(t => `
      <div class="approval-card" style="margin-bottom:16px">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
            <div style="width:40px;height:40px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-weight:700">${Utils.initials(t.full_name)}</div>
            <div><div style="font-weight:700;color:var(--primary)">${t.full_name}</div><div style="font-size:12px;color:var(--gray-500)">${Utils.timeAgo(t.created_at)} • <span class="badge badge-gold">${t.category}</span></div></div>
          </div>
          <div style="font-weight:700;margin-bottom:8px;font-size:16px">${t.title}</div>
          <div style="font-size:14px;color:var(--gray-700);line-height:1.6;margin-bottom:12px">${t.content}</div>
          ${t.media_url ? `<img src="${t.media_url}" style="max-height:200px;border-radius:8px;margin-bottom:12px;max-width:100%">` : ''}
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-left:16px">
          <button class="btn btn-primary btn-sm" onclick="approve('${t.id}',this)">✅ Approve</button>
          <button class="btn btn-danger btn-sm" onclick="reject('${t.id}')">❌ Reject</button>
        </div>
      </div>`).join('');
  } catch(e) { container.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><h3>Error loading</h3></div>'; }
}
async function approve(id, btn) {
  btn.textContent = 'Approving...'; btn.disabled = true;
  const res = await API.approveTestimony(id);
  if (res?.success) { Toast.success('Testimony approved! 🙌 The member will be notified.'); loadPending(); }
  else { Toast.error(res?.message || 'Error'); btn.textContent = '✅ Approve'; btn.disabled = false; }
}
async function reject(id) {
  const reason = prompt('Reason for rejection (optional):') || '';
  const res = await API.rejectTestimony(id, reason);
  if (res?.success) { Toast.success('Testimony rejected.'); loadPending(); }
  else Toast.error(res?.message || 'Error');
}
function logout() { API.clearSession(); window.location.href = '/login.html'; }
init();
</script>
</body>
</html>
