<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile | Transformation Encounter</title>
<link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/member.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="sidebar-brand"><div style="width:40px;height:40px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:20px">🔥</div><div><div class="sidebar-title">TE Group</div></div></div></div>
    <div class="sidebar-user"><div id="sidebarAvatar" style="width:40px;height:40px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:white;font-weight:700">?</div><div><div class="sidebar-username" id="sidebarName">Loading...</div></div></div>
    <nav class="sidebar-nav">
      <a href="/member/dashboard.html" class="sidebar-link"><span class="icon">🏠</span> Home Feed</a>
      <a href="/member/prayer-requests.html" class="sidebar-link"><span class="icon">🙏</span> Prayer Requests</a>
      <a href="/member/testimonies.html" class="sidebar-link"><span class="icon">✨</span> Testimonies</a>
      <a href="/member/events.html" class="sidebar-link"><span class="icon">📅</span> Events</a>
      <a href="/member/giving.html" class="sidebar-link"><span class="icon">💰</span> Giving & Dues</a>
    </nav>
    <div class="sidebar-footer"><a href="/member/profile.html" class="sidebar-link active"><span class="icon">👤</span> My Profile</a><a href="#" onclick="logout()" class="sidebar-link"><span class="icon">🚪</span> Sign Out</a></div>
  </aside>
  <div class="main-content">
    <header class="top-bar">
      <div class="top-bar-left"><button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button><div class="page-title">👤 My Profile</div></div>
      <div class="top-bar-right"><button class="btn btn-primary btn-sm" onclick="saveProfile()">💾 Save Changes</button></div>
    </header>
    <div class="content-area">
      <!-- Profile Header -->
      <div class="profile-header" style="margin-bottom:24px">
        <div style="position:relative;display:inline-block">
          <div id="profilePhotoEl" style="width:90px;height:90px;border-radius:50%;background:white;border:4px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--primary);font-weight:700;overflow:hidden">
            <span id="profileInitials">?</span>
            <img id="profileImg" style="width:100%;height:100%;object-fit:cover;display:none" alt="Profile">
          </div>
          <label style="position:absolute;bottom:0;right:0;width:28px;height:28px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px" title="Change photo">
            📷<input type="file" id="photoInput" accept="image/*" style="display:none" onchange="previewPhoto(this)">
          </label>
        </div>
        <div>
          <div class="profile-name" id="profileName">Loading...</div>
          <div class="profile-role" id="profileRole"></div>
          <div class="profile-since" id="profileSince"></div>
        </div>
        <div style="margin-left:auto;text-align:right">
          <div style="font-size:11px;color:rgba(255,255,255,0.6);margin-bottom:4px">Member Since</div>
          <div style="font-size:14px;font-weight:700;color:var(--gold)" id="joinDate"></div>
        </div>
      </div>

      <div class="grid-2" style="gap:24px">
        <!-- PERSONAL DETAILS -->
        <div class="card">
          <div class="card-title" style="margin-bottom:20px">👤 Personal Information</div>
          <div class="form-group"><label class="form-label">Full Name</label><input class="form-control" id="fullName" placeholder="Your full name"></div>
          <div class="form-group"><label class="form-label">Email (cannot change)</label><input class="form-control" id="email" disabled style="opacity:0.6"></div>
          <div class="form-group"><label class="form-label">Phone Number</label><input class="form-control" id="phone" placeholder="+234 000 000 0000"></div>
          <div class="form-group"><label class="form-label">WhatsApp Number</label><input class="form-control" id="whatsapp" placeholder="If different from phone"></div>
          <div class="form-group"><label class="form-label">Date of Birth</label><input type="date" class="form-control" id="birthday"></div>
          <div class="form-group"><label class="form-label">Department / Ministry</label><input class="form-control" id="department" placeholder="e.g. Choir, Ushering, Intercessory..."></div>
        </div>

        <!-- SPIRITUAL DETAILS -->
        <div>
          <div class="card" style="margin-bottom:20px">
            <div class="card-title" style="margin-bottom:20px">✝️ Spiritual Journey</div>
            <div class="form-group"><label class="form-label">Date of Salvation</label><input type="date" class="form-control" id="salvationDate"></div>
            <div class="form-group"><label class="form-label">Bio / About Me</label><textarea class="form-control" id="bio" rows="4" placeholder="Tell the community a bit about yourself..."></textarea></div>
          </div>

          <!-- MILESTONES -->
          <div class="card">
            <div class="card-title" style="margin-bottom:16px">🏆 Spiritual Milestones</div>
            <div id="milestonesList" style="margin-bottom:16px"></div>
            <button class="btn btn-outline btn-sm btn-block" onclick="Modal.open('milestoneModal')">+ Add Milestone</button>
          </div>

          <!-- SETTINGS -->
          <div class="card" style="margin-top:20px">
            <div class="card-title" style="margin-bottom:16px">⚙️ Preferences</div>
            <label style="display:flex;align-items:center;gap:12px;cursor:pointer;font-size:14px">
              <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()"> 🌙 Dark Mode
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MILESTONE MODAL -->
<div class="modal-overlay" id="milestoneModal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">🏆 Add Milestone</div><button class="modal-close">✕</button></div>
    <div class="form-group"><label class="form-label">Type</label><select class="form-control" id="msType"><option value="salvation">Salvation</option><option value="baptism">Baptism</option><option value="ministry">Ministry Achievement</option><option value="blessing">Blessing</option><option value="other">Other</option></select></div>
    <div class="form-group"><label class="form-label">Title</label><input class="form-control" id="msTitle" placeholder="e.g. Got Baptized in Water"></div>
    <div class="form-group"><label class="form-label">Date</label><input type="date" class="form-control" id="msDate"></div>
    <div class="form-group"><label class="form-label">Description</label><textarea class="form-control" id="msDesc" rows="3" placeholder="Share what this moment meant to you..."></textarea></div>
    <button class="btn btn-primary btn-block" onclick="saveMilestone()">Save Milestone</button>
  </div>
</div>

<div class="toast-container"></div>
<script src="/js/api.js"></script>
<script>
let currentUser = null;
async function init() {
  currentUser = Utils.requireAuth();
  if (!currentUser) return;
  const res = await API.getProfile();
  if (res?.profile) fillProfile(res.profile);
  loadMilestones();
}

function fillProfile(p) {
  document.getElementById('sidebarName').textContent = p.full_name;
  document.getElementById('sidebarAvatar').textContent = Utils.initials(p.full_name);
  document.getElementById('profileName').textContent = p.full_name;
  document.getElementById('profileRole').textContent = (p.role || 'member').toUpperCase();
  document.getElementById('joinDate').textContent = Utils.formatDate(p.created_at);
  document.getElementById('profileSince').textContent = `Member since ${Utils.formatDate(p.created_at)}`;
  document.getElementById('profileInitials').textContent = Utils.initials(p.full_name);
  if (p.profile_photo) {
    document.getElementById('profileImg').src = p.profile_photo;
    document.getElementById('profileImg').style.display = 'block';
    document.getElementById('profileInitials').style.display = 'none';
  }
  document.getElementById('fullName').value = p.full_name || '';
  document.getElementById('email').value = p.email || '';
  document.getElementById('phone').value = p.phone || '';
  document.getElementById('whatsapp').value = p.whatsapp_number || '';
  if (p.birthday) document.getElementById('birthday').value = p.birthday.slice(0,10);
  if (p.salvation_date) document.getElementById('salvationDate').value = p.salvation_date.slice(0,10);
  document.getElementById('department').value = p.department || '';
  document.getElementById('bio').value = p.bio || '';
  if (p.dark_mode) document.getElementById('darkModeToggle').checked = true;
}

async function loadMilestones() {
  const res = await API.get('/members/milestones');
  const container = document.getElementById('milestonesList');
  if (!res?.milestones?.length) { container.innerHTML = '<p style="color:var(--gray-500);font-size:13px">No milestones yet. Add your first!</p>'; return; }
  container.innerHTML = res.milestones.map(m => `
    <div style="display:flex;gap:12px;margin-bottom:12px;padding:10px;background:var(--gray-100);border-radius:8px">
      <div style="font-size:24px">${{salvation:'✝️',baptism:'💧',ministry:'🎖️',blessing:'🙌',other:'⭐'}[m.type]||'⭐'}</div>
      <div><div style="font-weight:700;color:var(--primary);font-size:13px">${m.title}</div><div style="font-size:12px;color:var(--gray-500)">${Utils.formatDate(m.milestone_date)}</div></div>
    </div>`).join('');
}

async function saveProfile() {
  const fd = new FormData();
  fd.append('full_name', document.getElementById('fullName').value);
  fd.append('phone', document.getElementById('phone').value);
  fd.append('whatsapp_number', document.getElementById('whatsapp').value);
  fd.append('birthday', document.getElementById('birthday').value);
  fd.append('salvation_date', document.getElementById('salvationDate').value);
  fd.append('department', document.getElementById('department').value);
  fd.append('bio', document.getElementById('bio').value);
  const photo = document.getElementById('photoInput').files[0];
  if (photo) fd.append('photo', photo);
  const res = await API.updateProfile(fd);
  if (res?.success) Toast.success('Profile updated successfully! 🙌');
  else Toast.error(res?.message || 'Error saving profile');
}

function previewPhoto(input) {
  if (input.files[0]) {
    const reader = new FileReader();
    reader.onload = (e) => {
      document.getElementById('profileImg').src = e.target.result;
      document.getElementById('profileImg').style.display = 'block';
      document.getElementById('profileInitials').style.display = 'none';
    };
    reader.readAsDataURL(input.files[0]);
  }
}

async function saveMilestone() {
  const data = { type: document.getElementById('msType').value, title: document.getElementById('msTitle').value, description: document.getElementById('msDesc').value, milestone_date: document.getElementById('msDate').value };
  if (!data.title || !data.milestone_date) return Toast.error('Please fill title and date');
  const res = await API.post('/members/milestones', data);
  if (res?.success) { Toast.success('Milestone saved! 🏆'); Modal.close('milestoneModal'); loadMilestones(); }
  else Toast.error(res?.message || 'Error');
}

function toggleDarkMode() {
  const isDark = document.getElementById('darkModeToggle').checked;
  document.body.classList.toggle('dark-mode', isDark);
  API.put('/auth/me', { dark_mode: isDark });
}

function logout() { API.clearSession(); window.location.href = '/login.html'; }
init();
</script>
</body>
</html>
