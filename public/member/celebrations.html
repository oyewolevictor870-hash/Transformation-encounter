<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celebrations | Transformation Encounter</title>
<link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/member.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="sidebar-brand"><div style="width:40px;height:40px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:20px">🔥</div><div><div class="sidebar-title">TE Group</div></div></div></div>
    <div class="sidebar-user"><div id="sidebarAvatar" style="width:40px;height:40px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:white;font-weight:700">?</div><div><div class="sidebar-username" id="sidebarName">Loading...</div></div></div>
    <nav class="sidebar-nav">
      <a href="/member/dashboard.html" class="sidebar-link"><span class="icon">🏠</span> Home Feed</a>
      <a href="/member/celebrations.html" class="sidebar-link active"><span class="icon">🎂</span> Celebrations</a>
      <a href="/member/directory.html" class="sidebar-link"><span class="icon">👥</span> Directory</a>
    </nav>
    <div class="sidebar-footer"><a href="#" onclick="logout()" class="sidebar-link"><span class="icon">🚪</span> Sign Out</a></div>
  </aside>
  <div class="main-content">
    <header class="top-bar">
      <div class="top-bar-left"><button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button><div class="page-title">🎂 Celebrations</div></div>
      <div class="top-bar-right" id="postCelebBtn" style="display:none"><button class="btn btn-gold btn-sm" onclick="Modal.open('celebModal')">+ Post Celebration</button></div>
    </header>
    <div class="content-area">
      <div class="alert alert-success" style="margin-bottom:20px">🎉 Birthdays are celebrated automatically! Update your birthday in your profile to be celebrated by the community.</div>
      <div id="celebrationsList"><div class="flex-center" style="padding:60px"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>
<!-- POST CELEBRATION MODAL -->
<div class="modal-overlay" id="celebModal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">🎉 Post Celebration</div><button class="modal-close">✕</button></div>
    <div class="form-group"><label class="form-label">Type</label><select class="form-control" id="celType"><option value="birthday">🎂 Birthday</option><option value="anniversary">💍 Anniversary</option><option value="graduation">🎓 Graduation</option><option value="blessing">🙌 Blessing</option><option value="promotion">📈 Promotion</option><option value="other">🎉 Other</option></select></div>
    <div class="form-group"><label class="form-label">Member Being Celebrated</label><input class="form-control" id="celMember" placeholder="Search member name..." oninput="searchMember()"></div>
    <div id="memberSuggestions" style="max-height:150px;overflow-y:auto;border:1px solid var(--gray-200);border-radius:8px;display:none;margin-bottom:12px"></div>
    <input type="hidden" id="celMemberId">
    <div class="form-group"><label class="form-label">Title</label><input class="form-control" id="celTitle" placeholder="e.g. Happy Birthday Sarah!"></div>
    <div class="form-group"><label class="form-label">Message</label><textarea class="form-control" id="celMessage" rows="4" placeholder="Write a heartfelt celebration message..."></textarea></div>
    <div class="form-group"><label class="form-label">Celebration Image (optional)</label><input type="file" class="form-control" id="celImage" accept="image/*"></div>
    <button class="btn btn-gold btn-block" onclick="postCelebration()">Post Celebration 🎉</button>
  </div>
</div>
<div class="toast-container"></div>
<script src="/js/api.js"></script>
<script>
let currentUser = null;
async function init() {
  currentUser = Utils.requireAuth();
  if (!currentUser) return;
  document.getElementById('sidebarName').textContent = currentUser.full_name;
  document.getElementById('sidebarAvatar').textContent = Utils.initials(currentUser.full_name);
  if (['worker','admin'].includes(currentUser.role)) document.getElementById('postCelebBtn').style.display = 'block';
  loadCelebrations();
}
async function loadCelebrations() {
  const container = document.getElementById('celebrationsList');
  try {
    const res = await API.getCelebrations();
    if (!res?.celebrations?.length) { container.innerHTML = '<div class="empty-state"><div class="icon">🎂</div><h3>No celebrations yet</h3><p>Update your birthday in profile to be celebrated!</p></div>'; return; }
    container.innerHTML = res.celebrations.map(c => `
      <div class="card" style="margin-bottom:20px;border-top:4px solid var(--gold)">
        <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px">
          <div style="font-size:40px">${{birthday:'🎂',anniversary:'💍',graduation:'🎓',blessing:'🙌',promotion:'📈',other:'🎉'}[c.type]||'🎉'}</div>
          <div>
            <div style="font-weight:800;font-size:18px;color:var(--primary)">${c.title}</div>
            <div style="font-size:13px;color:var(--gray-500)">${Utils.timeAgo(c.created_at)}</div>
          </div>
        </div>
        ${c.image_url ? `<img src="${c.image_url}" style="width:100%;border-radius:8px;margin-bottom:12px;max-height:300px;object-fit:cover" alt="${c.title}">` : ''}
        <div style="font-size:15px;color:var(--gray-700);line-height:1.7;margin-bottom:16px">${c.message}</div>
        <div style="display:flex;gap:12px;border-top:1px solid var(--gray-200);padding-top:12px;align-items:center">
          <button class="react-btn" onclick="likeCelebration('${c.id}',this)">❤️ ${c.like_count||0} Loves</button>
          <button class="react-btn" onclick="toggleComments('${c.id}')">💬 Wishes</button>
        </div>
        <div id="celebComments-${c.id}" style="display:none;margin-top:12px">
          <div id="celebCommentList-${c.id}"></div>
          <div style="display:flex;gap:8px;margin-top:8px">
            <input class="form-control" id="celebInput-${c.id}" placeholder="Write a birthday wish..." onkeydown="if(event.key==='Enter')addWish('${c.id}')">
            <button class="btn btn-primary btn-sm" onclick="addWish('${c.id}')">Send 🎉</button>
          </div>
        </div>
      </div>`).join('');
  } catch(e) { container.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><h3>Could not load</h3></div>'; }
}
async function likeCelebration(id, btn) {
  const res = await API.likeCelebration(id);
  if (res?.success) Toast.success(res.liked ? 'You showed love! ❤️' : 'Unliked');
}
async function toggleComments(id) {
  const box = document.getElementById(`celebComments-${id}`);
  if (box.style.display === 'none') {
    box.style.display = 'block';
    const res = await API.get(`/celebrations/${id}/comments`);
    const list = document.getElementById(`celebCommentList-${id}`);
    list.innerHTML = (res?.comments||[]).map(c => `<div style="padding:8px 0;border-bottom:1px solid var(--gray-100);font-size:13px"><strong style="color:var(--primary)">${c.full_name}:</strong> ${c.content}</div>`).join('');
  } else { box.style.display = 'none'; }
}
async function addWish(id) {
  const input = document.getElementById(`celebInput-${id}`);
  const content = input.value.trim();
  if (!content) return;
  const res = await API.commentCelebration(id, content);
  if (res?.success) { input.value = ''; toggleComments(id); setTimeout(() => toggleComments(id), 100); }
}
async function searchMember() {
  const q = document.getElementById('celMember').value;
  if (q.length < 2) { document.getElementById('memberSuggestions').style.display = 'none'; return; }
  const res = await API.getDirectory(q);
  const sugg = document.getElementById('memberSuggestions');
  if (res?.members?.length) {
    sugg.style.display = 'block';
    sugg.innerHTML = res.members.slice(0,5).map(m => `<div style="padding:10px;cursor:pointer;border-bottom:1px solid var(--gray-100);font-size:13px" onclick="selectMember('${m.id}','${m.full_name}')">${m.full_name}</div>`).join('');
  } else { sugg.style.display = 'none'; }
}
function selectMember(id, name) {
  document.getElementById('celMemberId').value = id;
  document.getElementById('celMember').value = name;
  document.getElementById('memberSuggestions').style.display = 'none';
}
async function postCelebration() {
  const fd = new FormData();
  fd.append('user_id', document.getElementById('celMemberId').value);
  fd.append('type', document.getElementById('celType').value);
  fd.append('title', document.getElementById('celTitle').value);
  fd.append('message', document.getElementById('celMessage').value);
  const img = document.getElementById('celImage').files[0];
  if (img) fd.append('image', img);
  const res = await API.postCelebration(fd);
  if (res?.success) { Toast.success('Celebration posted! 🎉'); Modal.close('celebModal'); loadCelebrations(); }
  else Toast.error(res?.message || 'Error');
}
function logout() { API.clearSession(); window.location.href = '/login.html'; }
init();
</script>
</body>
</html>
