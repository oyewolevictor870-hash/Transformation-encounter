<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Wall | Transformation Encounter</title>
<link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/member.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="sidebar-brand"><div style="width:40px;height:40px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:20px">🔥</div><div><div class="sidebar-title">TE Group</div></div></div></div>
    <div class="sidebar-user"><div id="sidebarAvatar" style="width:40px;height:40px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:white;font-weight:700">?</div><div><div class="sidebar-username" id="sidebarName">Loading...</div></div></div>
    <nav class="sidebar-nav">
      <a href="/member/dashboard.html" class="sidebar-link"><span class="icon">🏠</span> Home Feed</a>
      <a href="/member/prayer-requests.html" class="sidebar-link"><span class="icon">🙏</span> Prayer Requests</a>
      <a href="/member/prayer-wall.html" class="sidebar-link active"><span class="icon">🧱</span> Prayer Wall</a>
    </nav>
    <div class="sidebar-footer"><a href="#" onclick="logout()" class="sidebar-link"><span class="icon">🚪</span> Sign Out</a></div>
  </aside>
  <div class="main-content">
    <header class="top-bar">
      <div class="top-bar-left"><button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button><div class="page-title">🧱 Prayer Wall</div></div>
      <div class="top-bar-right"><button class="btn btn-primary btn-sm" onclick="Modal.open('wallModal')">+ Add Prayer</button></div>
    </header>
    <div class="content-area">
      <div class="alert alert-info">The Prayer Wall is a public board where members post brief prayer intentions. Everyone can agree in prayer. 🙏</div>
      <div id="wallContainer" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px">
        <div class="flex-center" style="grid-column:1/-1;padding:60px"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="wallModal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">🙏 Add to Prayer Wall</div><button class="modal-close">✕</button></div>
    <div class="form-group"><label class="form-label">Prayer Request (keep brief) *</label><textarea class="form-control" id="wallContent" rows="4" maxlength="300" placeholder="e.g. Please pray for my mother's healing..."></textarea><div style="text-align:right;font-size:11px;color:var(--gray-500);margin-top:4px">Max 300 characters</div></div>
    <label style="display:flex;align-items:center;gap:8px;font-size:14px;margin-bottom:16px"><input type="checkbox" id="wallAnon"> Post anonymously</label>
    <div class="form-group"><label class="form-label">Color Theme</label>
      <div id="colorPicker" style="display:flex;gap:8px;flex-wrap:wrap">
        <button onclick="selectColor('#2D1B69')" style="width:32px;height:32px;border-radius:50%;background:#2D1B69;border:none;cursor:pointer"></button>
        <button onclick="selectColor('#F5A623')" style="width:32px;height:32px;border-radius:50%;background:#F5A623;border:none;cursor:pointer"></button>
        <button onclick="selectColor('#E05C00')" style="width:32px;height:32px;border-radius:50%;background:#E05C00;border:none;cursor:pointer"></button>
        <button onclick="selectColor('#27ae60')" style="width:32px;height:32px;border-radius:50%;background:#27ae60;border:none;cursor:pointer"></button>
        <button onclick="selectColor('#2980b9')" style="width:32px;height:32px;border-radius:50%;background:#2980b9;border:none;cursor:pointer"></button>
      </div>
    </div>
    <input type="hidden" id="wallColor" value="#2D1B69">
    <button class="btn btn-primary btn-block" onclick="addToWall()">Add Prayer 🙏</button>
  </div>
</div>
<div class="toast-container"></div>
<script src="/js/api.js"></script>
<script>
let currentUser = null;
async function init() {
  currentUser = Utils.requireAuth();
  if (!currentUser) return;
  document.getElementById('sidebarName').textContent = currentUser.full_name;
  document.getElementById('sidebarAvatar').textContent = Utils.initials(currentUser.full_name);
  loadWall();
}
async function loadWall() {
  const container = document.getElementById('wallContainer');
  try {
    const res = await API.get('/prayers/wall');
    if (!res?.prayers?.length) { container.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">🧱</div><h3>The prayer wall is empty</h3><p>Be the first to post a prayer!</p></div>'; return; }
    container.innerHTML = res.prayers.map(p => `
      <div style="background:${p.color||'var(--primary)'};color:white;border-radius:12px;padding:20px;position:relative;cursor:default">
        <div style="font-size:11px;font-weight:700;opacity:0.7;text-transform:uppercase;margin-bottom:8px">🙏 Prayer</div>
        <div style="font-size:14px;line-height:1.7;margin-bottom:12px">"${p.content}"</div>
        <div style="font-size:11px;opacity:0.6;margin-bottom:12px">— ${p.is_anonymous?'Anonymous':p.full_name} • ${Utils.timeAgo(p.created_at)}</div>
        <button onclick="agreeInPrayer('${p.id}',this)" style="background:rgba(255,255,255,0.2);border:none;color:white;padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:600">🙏 Agree (${p.agree_count||0})</button>
      </div>`).join('');
  } catch(e) { container.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">⚠️</div><h3>Error loading</h3></div>'; }
}
function selectColor(c) {
  document.getElementById('wallColor').value = c;
  document.querySelectorAll('#colorPicker button').forEach(b => b.style.outline = '');
  event.target.style.outline = '3px solid #333';
}
async function agreeInPrayer(id, btn) {
  const res = await API.post(`/prayers/wall/${id}/agree`);
  if (res?.success) { btn.textContent = `🙌 Agreed (${res.count})`; }
}
async function addToWall() {
  const content = document.getElementById('wallContent').value.trim();
  if (!content) return Toast.error('Please write your prayer request');
  const res = await API.post('/prayers/wall', { content, is_anonymous: document.getElementById('wallAnon').checked, color: document.getElementById('wallColor').value });
  if (res?.success) { Toast.success('Added to Prayer Wall! 🙏'); Modal.close('wallModal'); document.getElementById('wallContent').value = ''; loadWall(); }
  else Toast.error(res?.message || 'Error');
}
function logout() { API.clearSession(); window.location.href = '/login.html'; }
init();
</script>
</body>
</html>
