<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications | Transformation Encounter</title>
<link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/member.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><div class="sidebar-brand"><div style="width:40px;height:40px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:20px">🔥</div><div><div class="sidebar-title">TE Group</div></div></div></div>
    <div class="sidebar-user"><div id="sidebarAvatar" style="width:40px;height:40px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:white;font-weight:700">?</div><div><div class="sidebar-username" id="sidebarName">Loading...</div></div></div>
    <nav class="sidebar-nav">
      <a href="/member/dashboard.html" class="sidebar-link"><span class="icon">🏠</span> Home Feed</a>
      <a href="/member/notifications.html" class="sidebar-link active"><span class="icon">🔔</span> Notifications</a>
    </nav>
    <div class="sidebar-footer"><a href="#" onclick="logout()" class="sidebar-link"><span class="icon">🚪</span> Sign Out</a></div>
  </aside>
  <div class="main-content">
    <header class="top-bar">
      <div class="top-bar-left"><button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button><div class="page-title">🔔 Notifications</div></div>
      <div class="top-bar-right"><button class="btn btn-outline btn-sm" onclick="markAll()">✓ Mark All Read</button></div>
    </header>
    <div class="content-area">
      <div id="notifList"><div class="flex-center" style="padding:60px"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>
<div class="toast-container"></div>
<script src="/js/api.js"></script>
<script>
async function init() {
  const user = Utils.requireAuth();
  if (!user) return;
  document.getElementById('sidebarName').textContent = user.full_name;
  document.getElementById('sidebarAvatar').textContent = Utils.initials(user.full_name);
  loadNotifs();
}
const typeIcons = { prayer_answered: '🙏', account_approved: '🎉', birthday: '🎂', event_reminder: '⏰', devotional: '📖', broadcast: '📣', voice_room: '📻', member_birthday: '🎂', role_changed: '🎖️', testimony_approved: '✨' };
async function loadNotifs() {
  const container = document.getElementById('notifList');
  const res = await API.getNotifications();
  if (!res?.notifications?.length) { container.innerHTML = '<div class="empty-state"><div class="icon">🔔</div><h3>No notifications yet</h3><p>You\'re all caught up!</p></div>'; return; }
  container.innerHTML = res.notifications.map(n => `
    <div class="notif-item ${n.is_read ? '' : 'unread'}" onclick="markRead('${n.id}',this)">
      <div class="notif-icon">${typeIcons[n.type] || '🔔'}</div>
      <div class="notif-content">
        <div class="title">${n.title}</div>
        <div class="message">${n.message}</div>
        <div class="time">${Utils.timeAgo(n.created_at)}</div>
      </div>
      ${!n.is_read ? '<div class="notif-dot"></div>' : ''}
    </div>`).join('');
}
async function markRead(id, el) {
  el.classList.remove('unread');
  el.querySelector('.notif-dot')?.remove();
  await API.markRead(id);
}
async function markAll() {
  await API.markAllRead();
  loadNotifs();
  Toast.success('All notifications marked as read');
}
function logout() { API.clearSession(); window.location.href = '/login.html'; }
init();
</script>
</body>
</html>
