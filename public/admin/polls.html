<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="admin-sidebar-header"><div style="font-size:24px">🔥</div><div class="admin-sidebar-title">Admin Panel</div><div class="admin-sidebar-subtitle">Transformation Encounter</div></div>
    <nav class="admin-nav">
      <a href="/admin/index.html" class="admin-nav-link"><span class="nav-icon">📊</span> Overview</a>
      <a href="/admin/members.html" class="admin-nav-link"><span class="nav-icon">👥</span> Members</a>
      <a href="/admin/approvals.html" class="admin-nav-link"><span class="nav-icon">⏳</span> Pending Approvals</a>
      <a href="/admin/financials.html" class="admin-nav-link"><span class="nav-icon">💰</span> Financials</a>
      <a href="/admin/testimonies.html" class="admin-nav-link"><span class="nav-icon">✨</span> Testimonies</a>
      <a href="/admin/notifications.html" class="admin-nav-link"><span class="nav-icon">📣</span> Notifications</a>
      <a href="/admin/voice-rooms.html" class="admin-nav-link"><span class="nav-icon">📻</span> Voice Rooms</a>
      <a href="/admin/polls.html" class="admin-nav-link active"><span class="nav-icon">🗳️</span> Polls</a>
      <a href="/admin/events.html" class="admin-nav-link"><span class="nav-icon">📅</span> Events</a>
      <a href="/admin/logs.html" class="admin-nav-link"><span class="nav-icon">📋</span> Action Logs</a>
      <a href="/admin/reports.html" class="admin-nav-link"><span class="nav-icon">📈</span> Reports</a>
      <a href="/admin/visitors-contact.html" class="admin-nav-link"><span class="nav-icon">📬</span> Visitor Messages</a>
      <a href="/admin/content.html" class="admin-nav-link"><span class="nav-icon">🗂️</span> Content</a>
      <a href="/admin/livestream.html" class="admin-nav-link"><span class="nav-icon">🎥</span> Livestream</a>
      <a href="/admin/settings.html" class="admin-nav-link"><span class="nav-icon">⚙️</span> Settings</a>
    </nav>
    <div style="padding:16px 20px;border-top:1px solid rgba(255,255,255,0.08)">
      <a href="/member/dashboard.html" class="admin-nav-link" style="padding:8px 0"><span class="nav-icon">↩️</span> Member View</a>
      <a href="#" onclick="logout()" class="admin-nav-link" style="padding:8px 0"><span class="nav-icon">🚪</span> Sign Out</a>
    </div>
  </aside>
  <div class="admin-main">
    <header class="admin-topbar">
      <div style="display:flex;align-items:center;gap:16px">
        <button style="background:none;border:none;font-size:20px;cursor:pointer" onclick="document.getElementById('adminSidebar').classList.toggle('open')">☰</button>
        <div class="admin-page-title">🗳️ Polls Management</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="Modal.open('createPollModal')">+ Create Poll</button>
    </header>
    <div class="admin-content">
      <div id="pollsList"><div class="flex-center" style="padding:60px"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>

<!-- CREATE POLL MODAL -->
<div class="modal-overlay" id="createPollModal">
  <div class="modal" style="max-width:500px">
    <div class="modal-header"><div class="modal-title">🗳️ Create New Poll</div><button class="modal-close">✕</button></div>
    <div class="form-group"><label class="form-label">Question *</label><input class="form-control" id="pollQuestion" placeholder="e.g. Which service time do you prefer?"></div>
    <div class="form-group"><label class="form-label">Options (one per line) *</label><textarea class="form-control" id="pollOptions" rows="4" placeholder="Morning Service&#10;Evening Service&#10;Both"></textarea></div>
    <div class="form-group"><label class="form-label">Closes At (optional)</label><input type="datetime-local" class="form-control" id="pollEndsAt"></div>
    <div style="display:flex;gap:12px;margin-top:4px">
      <button class="btn btn-outline" onclick="Modal.close('createPollModal')">Cancel</button>
      <button class="btn btn-primary" style="flex:1" onclick="createPoll()">Create Poll</button>
    </div>
  </div>
</div>

<div class="toast-container"></div>
<script src="/js/api.js"></script>
<script>
async function init() {
  if (!(await Utils.requireRole(['admin']))) return;
  loadPolls();
}
async function loadPolls() {
  const container = document.getElementById('pollsList');
  try {
    const res = await API.getPolls();
    const polls = res?.polls || [];
    if (!polls.length) {
      container.innerHTML = '<div class="empty-state"><div class="icon">🗳️</div><h3>No polls yet</h3><p>Create a poll to engage your members</p></div>';
      return;
    }
    container.innerHTML = polls.map(p => {
      const total = (p.options || []).reduce((s, o) => s + (o.votes || 0), 0);
      return `<div class="card" style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div><div style="font-weight:700;font-size:16px;color:var(--primary)">${p.question}</div>
          <div style="font-size:12px;color:var(--gray-500);margin-top:4px">${total} vote(s) • Created: ${Utils.formatDate(p.created_at)}${p.ends_at ? ' • Closes: ' + Utils.formatDate(p.ends_at) : ''}</div></div>
          <button class="btn btn-danger btn-sm" onclick="deletePoll('${p.id}')">🗑️ Delete</button>
        </div>
        ${(p.options || []).map(o => {
          const pct = total ? Math.round((o.votes || 0) / total * 100) : 0;
          return `<div style="margin-bottom:8px">
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${o.text}</span><span style="font-weight:700">${o.votes || 0} (${pct}%)</span></div>
            <div style="background:var(--gray-200);border-radius:4px;height:8px"><div style="background:var(--primary);height:8px;border-radius:4px;width:${pct}%"></div></div>
          </div>`;
        }).join('')}
      </div>`;
    }).join('');
  } catch(e) { container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--danger)">Error loading polls</div>'; }
}
async function createPoll() {
  const question = document.getElementById('pollQuestion').value.trim();
  const optionsText = document.getElementById('pollOptions').value.trim();
  const ends_at = document.getElementById('pollEndsAt').value;
  if (!question || !optionsText) return Toast.error('Question and options are required');
  const options = optionsText.split('\n').map(o => o.trim()).filter(o => o);
  if (options.length < 2) return Toast.error('Please provide at least 2 options');
  const res = await API.post('/admin/polls', { question, options, ends_at: ends_at || null });
  if (res?.success) { Toast.success('Poll created! 🗳️'); Modal.close('createPollModal'); document.getElementById('pollQuestion').value = ''; document.getElementById('pollOptions').value = ''; loadPolls(); }
  else Toast.error(res?.message || 'Error creating poll');
}
async function deletePoll(id) {
  if (!confirm('Delete this poll permanently?')) return;
  const res = await API.delete(`/admin/polls/${id}`);
  if (res?.success) { Toast.success('Poll deleted.'); loadPolls(); }
  else Toast.error(res?.message || 'Error');
}
function logout() { API.clearSession(); window.location.href = '/login.html'; }
init();
</script>
</body>
</html>
