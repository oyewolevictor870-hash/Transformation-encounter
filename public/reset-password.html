<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | Transformation Encounter</title>
<link rel="stylesheet" href="/css/main.css">
<style>
  body { background: linear-gradient(135deg, #1A0F45 0%, #2D1B69 50%, #4A2D9A 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .auth-card { background: white; border-radius: 24px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  .back-link { text-align: center; margin-top: 16px; font-size: 13px; }
  .back-link a { color: white; opacity: 0.7; }
</style>
</head>
<body>
<div>
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:48px">🔥</div>
      <h1 style="font-size:20px;font-weight:800;color:var(--primary);margin-top:8px">Reset Password</h1>
      <p style="font-size:13px;color:var(--gray-500)">Enter your new password below</p>
    </div>
    <div id="alertBox"></div>
    <div id="formSection">
      <div class="form-group">
        <label class="form-label">New Password</label>
        <div style="position:relative">
          <input type="password" class="form-control" id="newPassword" placeholder="At least 8 characters" autocomplete="new-password">
          <button type="button" onclick="togglePwd('newPassword','eye1')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px" id="eye1">👁</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <div style="position:relative">
          <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat your new password" autocomplete="new-password">
          <button type="button" onclick="togglePwd('confirmPassword','eye2')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px" id="eye2">👁</button>
        </div>
      </div>
      <button class="btn btn-primary btn-block btn-lg" id="submitBtn" onclick="resetPassword()">Set New Password</button>
    </div>
    <div style="text-align:center;margin-top:24px;font-size:13px;color:var(--gray-500)">
      <a href="/login.html" style="color:var(--primary);font-weight:700">Back to Login</a>
    </div>
  </div>
  <div class="back-link"><a href="/">← Back to Home</a></div>
</div>
<script src="/js/api.js"></script>
<script>
const token = new URLSearchParams(window.location.search).get('token');

if (!token) {
  document.getElementById('alertBox').innerHTML = '<div class="alert alert-danger">⚠️ Invalid or missing reset token. Please request a new reset link.</div>';
  document.getElementById('formSection').style.display = 'none';
}

function togglePwd(inputId, btnId) {
  const input = document.getElementById(inputId);
  input.type = input.type === 'password' ? 'text' : 'password';
}

async function resetPassword() {
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const btn = document.getElementById('submitBtn');
  const alertBox = document.getElementById('alertBox');
  alertBox.innerHTML = '';

  if (!newPassword || !confirmPassword) { alertBox.innerHTML = '<div class="alert alert-danger">Please fill in both fields.</div>'; return; }
  if (newPassword.length < 8) { alertBox.innerHTML = '<div class="alert alert-danger">Password must be at least 8 characters.</div>'; return; }
  if (newPassword !== confirmPassword) { alertBox.innerHTML = '<div class="alert alert-danger">Passwords do not match.</div>'; return; }

  btn.textContent = 'Saving...'; btn.disabled = true;
  const res = await API.post('/auth/reset-password', { token, new_password: newPassword });

  if (res?.success) {
    document.getElementById('formSection').innerHTML = `
      <div style="text-align:center;padding:20px 0">
        <div style="font-size:48px;margin-bottom:16px">✅</div>
        <div style="font-weight:700;font-size:18px;color:var(--primary);margin-bottom:8px">Password Reset!</div>
        <p style="font-size:14px;color:var(--gray-500);line-height:1.6">Your password has been updated successfully. You can now log in with your new password.</p>
        <a href="/login.html" class="btn btn-primary" style="margin-top:20px">Go to Login</a>
      </div>`;
  } else {
    alertBox.innerHTML = `<div class="alert alert-danger">⚠️ ${res?.message || 'Error resetting password. The link may have expired.'}</div>`;
    btn.textContent = 'Set New Password'; btn.disabled = false;
  }
}
</script>
</body>
</html>
